server {
    listen 443 ssl;
    http2 on;
    server_name rudder-pi.schrottplatz.internal;

    ssl_certificate /etc/ssl/certs/WEBAPPS.schrottplatz.internal.crt;
    ssl_certificate_key /etc/ssl/private/WEBAPPS.schrottplatz.internal.key;

    location / {
        proxy_pass http://192.168.5.10:7860;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets (Gradio nutzt das oft)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}